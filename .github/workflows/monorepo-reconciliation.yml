name: Monorepo reconciliation profile

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Freeze profile matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.value }}
    steps:
      - uses: actions/checkout@v7

      - name: Build matrix from the frozen manifest
        id: matrix
        run: |
          value=$(jq -c '{include: [.profile as $profile | .corpora[] as $corpus | ["ubuntu-latest", "macos-latest", "windows-latest"][] as $os | {os: $os, corpus: $corpus.id, repository: $corpus.repository, revision: $corpus.revision, iterations: $profile.iterations, read_samples: $profile.read_samples, hot_set: $profile.hot_set, watcher_debounce_ms: $profile.watcher_debounce_ms}]}' benchmarks/monorepo_reconciliation.json)
          echo "value=$value" >> "$GITHUB_OUTPUT"

  profile:
    name: ${{ matrix.os }} / ${{ matrix.corpus }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: monorepo-profile-${{ matrix.os }}

      - name: Fetch pinned corpus
        run: |
          repository="$RUNNER_TEMP/monorepo-profile/${{ matrix.corpus }}"
          mkdir -p "$repository"
          git -C "$repository" init --quiet
          git -C "$repository" remote add origin "${{ matrix.repository }}"
          git -C "$repository" fetch --quiet --depth=1 origin "${{ matrix.revision }}"
          git -C "$repository" checkout --quiet --detach FETCH_HEAD
          test "$(git -C "$repository" rev-parse HEAD)" = "${{ matrix.revision }}"

      - name: Build release profiler
        run: cargo build --release --example indexing_profile

      - name: Profile on Linux
        if: runner.os == 'Linux'
        run: |
          mkdir -p target/monorepo-profile
          /usr/bin/time -v -o target/monorepo-profile/process.txt \
            target/release/examples/indexing_profile \
              --repository "$RUNNER_TEMP/monorepo-profile/${{ matrix.corpus }}" \
              --repository-label "${{ matrix.repository }}" \
              --iterations "${{ matrix.iterations }}" \
              --read-samples "${{ matrix.read_samples }}" \
              --hot-set "${{ matrix.hot_set }}" \
              --watcher-debounce-ms "${{ matrix.watcher_debounce_ms }}" \
              --output target/monorepo-profile/profile.json \
            > target/monorepo-profile/stdout.json
          peak_kib=$(awk -F: '/Maximum resident set size/ {gsub(/^[[:space:]]+/, "", $2); print $2}' target/monorepo-profile/process.txt)
          jq -n --argjson bytes "$((peak_kib * 1024))" \
            '{peak_rss_bytes: $bytes, source: "gnu-time-maximum-resident-set-size"}' \
            > target/monorepo-profile/peak-rss.json

      - name: Profile on macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p target/monorepo-profile
          /usr/bin/time -l \
            target/release/examples/indexing_profile \
              --repository "$RUNNER_TEMP/monorepo-profile/${{ matrix.corpus }}" \
              --repository-label "${{ matrix.repository }}" \
              --iterations "${{ matrix.iterations }}" \
              --read-samples "${{ matrix.read_samples }}" \
              --hot-set "${{ matrix.hot_set }}" \
              --watcher-debounce-ms "${{ matrix.watcher_debounce_ms }}" \
              --output target/monorepo-profile/profile.json \
            > target/monorepo-profile/stdout.json \
            2> target/monorepo-profile/process.txt
          peak_bytes=$(awk '/maximum resident set size/ {print $1}' target/monorepo-profile/process.txt)
          jq -n --argjson bytes "$peak_bytes" \
            '{peak_rss_bytes: $bytes, source: "bsd-time-maximum-resident-set-size"}' \
            > target/monorepo-profile/peak-rss.json

      - name: Profile on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target/monorepo-profile | Out-Null
          $arguments = @(
            '--repository', "$env:RUNNER_TEMP/monorepo-profile/${{ matrix.corpus }}",
            '--repository-label', '${{ matrix.repository }}',
            '--iterations', '${{ matrix.iterations }}',
            '--read-samples', '${{ matrix.read_samples }}',
            '--hot-set', '${{ matrix.hot_set }}',
            '--watcher-debounce-ms', '${{ matrix.watcher_debounce_ms }}',
            '--output', 'target/monorepo-profile/profile.json'
          )
          $start = @{
            FilePath = 'target/release/examples/indexing_profile.exe'
            ArgumentList = $arguments
            NoNewWindow = $true
            PassThru = $true
            RedirectStandardOutput = 'target/monorepo-profile/stdout.json'
            RedirectStandardError = 'target/monorepo-profile/process.txt'
          }
          $process = Start-Process @start
          $sampledPeak = 0L
          while (-not $process.HasExited) {
            $process.Refresh()
            $sampledPeak = [Math]::Max($sampledPeak, $process.WorkingSet64)
            Start-Sleep -Milliseconds 20
          }
          $process.WaitForExit()
          if ($process.ExitCode -ne 0) {
            Get-Content target/monorepo-profile/process.txt
            exit $process.ExitCode
          }
          @{ peak_rss_bytes = $sampledPeak; source = 'powershell-working-set-20ms-sampler' } |
            ConvertTo-Json |
            Set-Content target/monorepo-profile/peak-rss.json

      - name: Verify artifact identity
        run: |
          test "$(jq -r '.schema_version' target/monorepo-profile/profile.json)" = 7
          test "$(jq -r '.corpus.revision' target/monorepo-profile/profile.json)" = "${{ matrix.revision }}"
          test "$(jq -r '.release_build' target/monorepo-profile/profile.json)" = true
          test "$(jq -r '.leantoken_worktree_dirty' target/monorepo-profile/profile.json)" = false

      - name: Publish job summary
        run: |
          echo "## ${{ matrix.corpus }} / ${{ matrix.os }}" >> "$GITHUB_STEP_SUMMARY"
          jq -r '"- Corpus: \(.corpus.files) files / \(.corpus.total_bytes) bytes\n- Full no-op p50/p95: \(.full_noop.timing.p50_us / 1000) / \(.full_noop.timing.p95_us / 1000) ms\n- Targeted modify p50/p95: \(.targeted_changed.timing.p50_us / 1000) / \(.targeted_changed.timing.p95_us / 1000) ms\n- Watcher delivery p50/p95: \(.watcher_modify_delivery.timing.p50_us / 1000) / \(.watcher_modify_delivery.timing.p95_us / 1000) ms"' target/monorepo-profile/profile.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload profile artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monorepo-profile-${{ matrix.os }}-${{ matrix.corpus }}
          path: target/monorepo-profile/
          retention-days: 14

  aggregate:
    name: Validate matrix and decide
    needs: profile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: monorepo-profile-aggregate

      - name: Download raw profiles
        uses: actions/download-artifact@v8
        with:
          pattern: monorepo-profile-*
          path: target/monorepo-profile-artifacts

      - name: Aggregate frozen matrix
        run: |
          cargo run --release --example monorepo_reconciliation_report -- \
            --manifest benchmarks/monorepo_reconciliation.json \
            --artifacts target/monorepo-profile-artifacts \
            --output target/monorepo-reconciliation-report.json \
            > target/monorepo-reconciliation-stdout.json

      - name: Publish decision summary
        run: |
          echo "## Monorepo reconciliation decision" >> "$GITHUB_STEP_SUMMARY"
          jq -r '"- Decision: \(.decision)\n- Material pairs: \(.material_pairs) / \(.expected_pairs)\n- Runtime revision: `\(.leantoken_git_revision)`"' target/monorepo-reconciliation-report.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload aggregate report
        uses: actions/upload-artifact@v4
        with:
          name: monorepo-reconciliation-report
          path: |
            target/monorepo-reconciliation-report.json
            target/monorepo-reconciliation-stdout.json
          retention-days: 14
