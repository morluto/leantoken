name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      manifests: ${{ steps.filter.outputs.manifests }}
      release: ${{ steps.filter.outputs.release }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v7

      - name: Classify changed paths
        id: filter
        if: github.event_name != 'schedule'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            manifests:
              - '**/Cargo.toml'
              - 'Cargo.lock'
            rust:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
            release:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'dist-workspace.toml'
              - '.github/workflows/release.yml'
              - '.github/workflows/build-npm-packages.yml'
              - 'npm/**'
              - 'scripts/build-npm-packages.mjs'

  quality:
    name: Code quality checks
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: quality

      - name: Check duplicate files
        run: bash scripts/check-duplicates.sh

      - name: Validate AGENTS.md
        run: bash scripts/validate-agents-md.sh

      - name: Test npm packaging
        run: node --test npm/npm-packaging.test.mjs

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint all targets
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Validate public API documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps

      - name: Upload documentation for deployment
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: rustdoc
          path: target/doc/
          retention-days: 7

  secret-scan:
    name: Secret scan
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  dependency-audit:
    name: Dependency audit
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.manifests == 'true'
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: audit

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit dependencies
        run: cargo audit

  unused-deps:
    name: Unused dependencies
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: udeps

      - name: Install cargo-udeps
        uses: taiki-e/install-action@cargo-udeps

      - name: Check unused dependencies
        run: cargo +nightly udeps --all-targets --all-features

  release-plan:
    name: Release plan
    needs: changes
    if: needs.changes.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@0.32.0

      - name: Validate release plan
        run: dist plan

  ci:
    name: ${{ matrix.os }}
    if: github.event_name != 'schedule'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}

      - name: Test npm installation
        run: node --test npm/npm-install-e2e.mjs

      - name: Test all targets
        run: |
          set +e
          START=$(date +%s)
          cargo test --all-targets --all-features 2>&1 | tee test-output.txt
          status=${PIPESTATUS[0]}
          END=$(date +%s)
          DURATION=$((END - START))
          echo "test_suite_duration_seconds=${DURATION}" >> "$GITHUB_ENV"
          echo "Test suite completed in ${DURATION}s"
          exit "$status"

      - name: Test timing summary
        if: success() || failure()
        run: |
          {
            echo "## Test Results (${{ matrix.os }})"
            echo "- Total suite duration: ${test_suite_duration_seconds:-unavailable}s"
            echo ""
            grep '^test result:' test-output.txt || true
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.os }}
          path: test-output.txt
          retention-days: 7

  coverage:
    name: Test coverage
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: llvm-tools

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info --fail-under-lines 60

      - name: Coverage report summary
        if: success() || failure()
        run: |
          echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          if [ -f lcov.info ]; then
            awk -F '[:,]' '
              /^DA:/ { total += 1; if ($3 > 0) covered += 1 }
              END { printf "- Lines covered: %d / %d\n", covered, total }
            ' lcov.info >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Coverage report was not generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 7

  docs-deploy:
    name: Deploy API documentation
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download generated documentation
        uses: actions/download-artifact@v8
        with:
          name: rustdoc
          path: target/doc/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/doc/
          destination_dir: api
