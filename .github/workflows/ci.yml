name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      manifests: ${{ steps.filter.outputs.manifests }}
      npm: ${{ steps.filter.outputs.npm }}
      release: ${{ steps.filter.outputs.release }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v7

      - name: Classify changed paths
        id: filter
        if: github.event_name != 'schedule'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            manifests:
              - '**/Cargo.toml'
              - 'Cargo.lock'
            rust:
              - 'src/**'
              - 'tests/**'
              - 'examples/**'
              - 'fixtures/**'
              - 'benchmarks/**/*.json'
              - 'benchmarks/**/*.jsonl'
              - 'README.md'
              - 'docs/usage.md'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo/**'
              - '.github/workflows/ci.yml'
            npm:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'npm/**'
              - 'scripts/build-npm-packages.mjs'
              - '.github/workflows/ci.yml'
            release:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'dist-workspace.toml'
              - '.github/workflows/release.yml'
              - '.github/workflows/build-npm-packages.yml'
              - 'npm/**'
              - 'scripts/build-npm-packages.mjs'

  quality:
    name: Code quality checks
    needs: changes
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Node.js
        if: needs.changes.outputs.npm == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        if: needs.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        if: needs.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: quality
          cache-workspace-crates: true

      - name: Check duplicate files
        run: bash scripts/check-duplicates.sh

      - name: Validate AGENTS.md
        run: bash scripts/validate-agents-md.sh

      - name: Test npm packaging
        if: needs.changes.outputs.npm == 'true'
        run: node --test npm/npm-packaging.test.mjs

      - name: Check formatting
        if: needs.changes.outputs.rust == 'true'
        run: cargo fmt --all -- --check

      - name: Lint all targets
        if: needs.changes.outputs.rust == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Validate public API documentation
        if: needs.changes.outputs.rust == 'true'
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps

      - name: Upload documentation for deployment
        if: needs.changes.outputs.rust == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: rustdoc
          path: target/doc/
          retention-days: 7

  secret-scan:
    name: Secret scan
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  dependency-audit:
    name: Dependency audit
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.manifests == 'true'
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: audit
          cache-workspace-crates: true

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit dependencies
        run: cargo audit

  unused-deps:
    name: Unused dependencies
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.manifests == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: udeps
          cache-workspace-crates: true

      - name: Install cargo-udeps
        uses: taiki-e/install-action@cargo-udeps

      - name: Check unused dependencies
        run: cargo +nightly udeps --all-targets --all-features

  release-plan:
    name: Release plan
    needs: changes
    if: needs.changes.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install dist
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-dist@0.32.0

      - name: Validate release plan
        run: dist plan

  ci:
    name: ${{ matrix.os }}
    needs: changes
    if: github.event_name != 'schedule' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.npm == 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v7

      - name: Install Node.js
        if: needs.changes.outputs.npm == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        if: needs.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache Rust dependencies
        if: needs.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}
          cache-workspace-crates: true

      - name: Test npm installation
        if: needs.changes.outputs.npm == 'true'
        run: node --test npm/npm-install-e2e.mjs

      - name: Test library, binary, and integration behavior
        if: needs.changes.outputs.rust == 'true'
        run: cargo test --all-features --lib --bins --test integration

  example-tests:
    name: Benchmark and example tests
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: example-tests
          cache-workspace-crates: true

      - name: Test benchmark, example, and documentation targets
        run: |
          cargo test --all-features --examples
          cargo test --all-features --doc

  coverage:
    name: Test coverage
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: llvm-tools

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
          cache-workspace-crates: true

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info --fail-under-lines 60

      - name: Print coverage summary
        if: success() || failure()
        run: cargo llvm-cov report

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 7

  docs-deploy:
    name: Deploy API documentation
    needs: [changes, quality]
    if: needs.changes.outputs.rust == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download generated documentation
        uses: actions/download-artifact@v8
        with:
          name: rustdoc
          path: target/doc/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/doc/
          destination_dir: api
