name: Build npm packages

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download native archives
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-build-local-*
          path: target/distrib
          merge-multiple: true

      - name: Build script-free npm packages
        run: |
          node scripts/build-npm-packages.mjs \
            --artifacts target/distrib \
            --out target/npm-packages

      - name: Upload npm packages
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-npm-packages
          path: target/npm-packages/*.tgz
