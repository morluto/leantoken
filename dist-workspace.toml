[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# Release Please creates tags with GITHUB_TOKEN, so explicitly dispatch the
# generated release workflow instead of relying on a suppressed tag-push event.
dispatch-releases = true
# Native npm packages are assembled from dist archives without install scripts.
installers = []
global-artifacts-jobs = ["./build-npm-packages"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
