repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: check-large-files
        name: check large files
        entry: bash scripts/check-large-files.sh
        language: system
        types: [file]
        pass_filenames: false
        verbose: true

      - id: check-todos
        name: check TODOs
        entry: bash scripts/check-todos.sh
        language: system
        types: [text]
        pass_filenames: false
        verbose: true
